<svg width="350" height="300" viewBox="30 30 220 300" xmlns="http://www.w3.org/2000/svg">
  <!-- 1. 原三角形（仅边框，无填充） -->
  <polygon points="231.25,60.94 50,300 208.72,279.78" 
           fill="none" stroke="#00008b" stroke-width="2" />

  <!-- 2. 内部三角形（仅DEF保留颜色，其他为背景色） -->
  <!-- 小三角1：A-F-D（背景色） -->
  <polygon points="231.25,60.94 219.985,170.36 140.625,180.47" 
           fill="#f0f0f0" stroke="#00008b" stroke-width="1" />
  <!-- 小三角2：B-D-E（背景色） -->
  <polygon points="50,300 140.625,180.47 129.36,289.89" 
           fill="#f0f0f0" stroke="#00008b" stroke-width="1" />
  <!-- 小三角3：C-E-F（背景色） -->
  <polygon points="208.72,279.78 129.36,289.89 219.985,170.36" 
           fill="#f0f0f0" stroke="#00008b" stroke-width="1" />
  <!-- 小三角4：D-E-F（保留浅紫色） -->
  <polygon points="140.625,180.47 129.36,289.89 219.985,170.36" 
           fill="#e6ccff" stroke="#00008b" stroke-width="1" />

  <!-- 3. 原三角形顶点标签 -->
  <text x="236.25" y="55" font-size="18" fill="#00008b">A</text>
  <text x="45" y="315" font-size="18" fill="#00008b">B</text>
  <text x="213" y="277" font-size="18" fill="#00008b">C</text>

  <!-- 4. 三条边的中点 -->
  <!-- AB边中点 D -->
  <circle cx="140.625" cy="180.47" r="4" fill="#00008b" />
  <text x="132.625" y="174.47" font-size="16" fill="#00008b">D</text>
  <!-- BC边中点 E -->
  <circle cx="129.36" cy="289.89" r="4" fill="#00008b" />
  <text x="121.36" y="283.89" font-size="16" fill="#00008b">E</text>
  <!-- AC边中点 F -->
  <circle cx="219.985" cy="170.36" r="4" fill="#00008b" />
  <text x="225.985" y="164.36" font-size="16" fill="#00008b">F</text>
</svg>
    
	